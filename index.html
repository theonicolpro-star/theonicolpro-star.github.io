<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Cuisine de Jeanine - Menu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Oswald',sans-serif;background:#004A05;color:white}
.container{max-width:900px;margin:auto}
header{text-align:center;padding:50px;position:relative}
.sav-btn{position:absolute;top:20px;left:20px;background:#ff6b00;color:white;border:4px solid white;padding:15px 30px;font-family:'Anton';font-size:24px;letter-spacing:2px;cursor:pointer;transition:.3s;box-shadow:0 4px 10px rgba(0,0,0,.5)}
.sav-btn:hover{transform:scale(1.05);box-shadow:0 6px 15px rgba(0,0,0,.7)}
.logo-image{max-width:600px;width:100%;filter:brightness(0) invert(1)}
.week-banner{background:rgba(0,0,0,.3);padding:20px;text-align:center;border-top:3px solid white;border-bottom:3px solid white}
.week-text{font-family:'Bebas Neue';font-size:26px;letter-spacing:3px;text-transform:uppercase}
.promo-section{padding:25px 30px 0}
.promo-box{background:#ffc107;color:#3e2723;padding:18px;border-left:6px solid #ff6f00}
.promo-title{font-family:'Anton';font-size:26px;margin-bottom:8px}
.promo-description{font-size:18px;line-height:1.4}
.section{padding:50px 30px}
.section-title{font-family:'Anton';font-size:50px;border-left:8px solid white;padding-left:20px;margin-bottom:30px}
.menu-list{display:flex;flex-direction:column;gap:15px}
.menu-item{background:white;color:black;padding:15px;display:flex;align-items:center;cursor:pointer;border-left:6px solid #004A05;transition:.3s}
.menu-item:hover{transform:translateX(8px);box-shadow:-5px 5px 15px rgba(0,0,0,.3)}
.item-image{width:90px;height:90px;object-fit:cover;margin-right:20px;border:4px solid #004A05}
.item-info{display:flex;justify-content:space-between;width:100%;align-items:center;gap:12px}
.item-name{text-transform:uppercase;font-size:24px;font-weight:600}
.item-price{font-family:'Anton';font-size:30px;color:#004A05;white-space:nowrap}
footer{background:rgba(0,0,0,.4);text-align:center;padding:30px;font-family:'Bebas Neue';letter-spacing:3px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;overflow-y:auto}
.modal-content{max-width:850px;margin:40px auto;background:linear-gradient(135deg,#003a04,#005a07);color:white;position:relative}
.close-btn{position:absolute;top:15px;right:15px;font-size:40px;background:black;color:white;border:none;cursor:pointer;width:50px;height:50px;z-index:1000}
.modal-image{width:100%;height:350px;object-fit:cover}
.modal-body{padding:40px}
.modal-title{font-family:'Anton';font-size:48px;margin-bottom:25px;border-bottom:3px solid white;padding-bottom:10px}
.allergenes-box{background:#ffc107;color:#3e2723;padding:20px;margin-top:20px;border-left:6px solid #ff6f00}
.sav-container{background:white;color:#2d3748;padding:30px;max-width:100%}
.sav-header{text-align:center;margin-bottom:30px;padding-bottom:20px;border-bottom:3px solid #004A05}
.sav-header h1{color:#2d3748;font-size:32px;margin-bottom:10px;font-family:'Anton'}
.sav-header p{color:#004A05;font-size:18px;font-weight:600}
.alert-box{background:#fff3cd;border-left:5px solid #ffc107;padding:20px;margin-bottom:25px;border-radius:8px}
.alert-box strong{color:#856404;font-size:18px;display:block;margin-bottom:10px}
.alert-box p{color:#856404;line-height:1.6;font-size:15px}
.sav-section{margin-bottom:25px}.sav-section-title{background:#004A05;color:white;padding:12px 15px;border-radius:8px;font-size:18px;font-weight:bold;margin-bottom:15px;display:flex;align-items:center}
.sav-section-title .number{background:white;color:#004A05;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;font-size:16px}
.step-content{background:#f7fafc;padding:18px;border-radius:8px;border-left:4px solid #004A05}
.step-content p{color:#2d3748;line-height:1.7;font-size:15px;margin-bottom:8px}
.step-content strong{color:#004A05}.step-content em{font-size:14px;color:#666}
.info-box{background:#e6f3ff;border-left:5px solid #2196F3;padding:18px;margin:15px 0;border-radius:8px}
.info-box h3{color:#1976D2;margin-bottom:12px;font-size:17px;font-family:'Oswald'}
.info-list{list-style:none;padding-left:0}
.info-list li{color:#2d3748;padding:6px 0;padding-left:25px;position:relative;line-height:1.5;font-size:15px}
.info-list li:before{content:"✓";position:absolute;left:0;color:#2196F3;font-weight:bold;font-size:18px}
.contact-box{background:#004A05;color:white;padding:20px;border-radius:12px;text-align:center;margin-top:25px}
.contact-box h2{margin-bottom:12px;font-size:22px;font-family:'Anton'}
.contact-box p{margin-top:12px;font-size:13px;opacity:0.9}
.highlight{background:#fef3c7;padding:2px 6px;border-radius:4px;font-weight:600;color:#2d3748}
.empty-state{padding:30px;text-align:center;background:rgba(255,255,255,.1);border:1px dashed rgba(255,255,255,.5)}
@media(max-width:700px){
.sav-btn{font-size:18px;padding:10px 20px}
.section-title{font-size:36px}
.item-name{font-size:20px}
.item-price{font-size:24px}
.modal-title{font-size:36px}
}
</style>
</head>
<body>
<div class="container">
<header>
<button class="sav-btn" onclick="openSAVModal()">SAV</button>
<img class="logo-image" alt="La Cuisine de Jeanine" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 300'%3E%3Ctext x='50%25' y='30%25' font-size='80' text-anchor='middle' letter-spacing='15'%3ELA CUISINE DE%3C/text%3E%3Ctext x='50%25' y='85%25' font-size='180' text-anchor='middle' letter-spacing='20'%3EJEANINE%3C/text%3E%3C/svg%3E">
</header>
<div class="week-banner"><div id="week-text" class="week-text"></div></div>
<div id="promo-section" class="promo-section" hidden>
  <div class="promo-box">
    <div id="promo-title" class="promo-title"></div>
    <div id="promo-description" class="promo-description"></div>
  </div>
</div>
<main id="menu-sections"></main>
<footer id="footer-text"></footer>
</div>
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">×</button>
    <div id="modal-body"></div>
  </div>
</div>
<script>
const LOCAL_STORAGE_KEY = 'menuData';
let menuData = null;
const productMap = new Map();

function escapeHtml(value=''){
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function getStoredData(){
  try {
    const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

async function loadMenuData(){
  const stored = getStoredData();
  if (stored) return stored;
  const response = await fetch('./menu.json', { cache: 'no-store' });
  if (!response.ok) throw new Error('Impossible de charger menu.json');
  return response.json();
}

function renderMenu(data){
  menuData = data;
  productMap.clear();
  document.title = data.settings?.siteTitle || 'Menu';
  document.getElementById('week-text').textContent = data.settings?.weekText || 'Menu';
  document.getElementById('footer-text').textContent = data.settings?.footerText || '';

  const promoSection = document.getElementById('promo-section');
  if (data.settings?.promoVisible) {
    promoSection.hidden = false;
    document.getElementById('promo-title').textContent = data.settings?.promoTitle || '';
    document.getElementById('promo-description').innerHTML = data.settings?.promoDescription || '';
  } else {
    promoSection.hidden = true;
  }

  const menuSections = document.getElementById('menu-sections');
  menuSections.innerHTML = '';

  if (!data.sections?.length) {
    menuSections.innerHTML = '<div class="section"><div class="empty-state">Aucune section disponible.</div></div>';
    return;
  }

  data.sections.forEach((section) => {
    const sectionEl = document.createElement('section');
    sectionEl.className = 'section';
    const productsHtml = (section.products || []).map((product) => {
      productMap.set(product.id, product);
      return `
      <article class="menu-item" onclick="openModal('${escapeHtml(product.id)}')">
        <img class="item-image" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">
        <div class="item-info">
          <span class="item-name">${escapeHtml(product.name)}</span>
          <span class="item-price">${escapeHtml(product.price)}</span>
        </div>
      </article>`;
    }).join('');

    sectionEl.innerHTML = `
      <h2 class="section-title">${escapeHtml(section.title)}</h2>
      <div class="menu-list">${productsHtml || '<div class="empty-state">Aucun produit dans cette section.</div>'}</div>`;
    menuSections.appendChild(sectionEl);
  });
}

function openModal(productId){
  const product = productMap.get(productId);
  if (!product) return;
  document.getElementById('modal-body').innerHTML = `
    <img class="modal-image" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">
    <div class="modal-body">
      <h2 class="modal-title">${escapeHtml(product.name)}</h2>
      <p>${escapeHtml(product.ingredients)}</p>
      ${product.allergens ? `<div class="allergenes-box"><strong>Allergènes :</strong><p>${escapeHtml(product.allergens)}</p></div>` : ''}
    </div>`;
  document.getElementById('modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(!e || e.target.id === 'modal'){
    document.getElementById('modal').style.display = 'none';
    document.body.style.overflow = 'auto';
  }
}

function openSAVModal(){
  const email = menuData?.settings?.savEmail || 'contact@lacuisinedejeanine.fr';
  const brand = menuData?.settings?.brandName || 'La Cuisine de Jeanine';
  document.getElementById('modal-body').innerHTML = `
  <div class="sav-container">
    <div class="sav-header"><h1>🛠️ Service Après-Vente</h1><p>${escapeHtml(brand)}</p></div>
    <div class="alert-box"><strong>⚠️ Un problème avec votre achat ?</strong><p>Suivez les étapes ci-dessous pour signaler une anomalie et obtenir une résolution rapide.</p></div>
    <div class="sav-section"><div class="sav-section-title"><span class="number">1</span>Contester un produit sur l'écran</div>
      <div class="step-content">
        <p><strong>Juste après la fermeture de la porte du frigo :</strong></p>
        <p>→ Un écran de validation s'affiche pour confirmer votre paiement</p>
        <p>→ Cliquez sur le bouton <span class="highlight">"Contester un produit"</span></p>
        <p>→ Sélectionnez le produit concerné pour marquer la transaction</p>
        <p><em>Cette étape permet de tracer automatiquement votre achat dans notre système.</em></p>
      </div>
    </div>
    <div class="sav-section"><div class="sav-section-title"><span class="number">2</span>Contacter notre équipe SAV</div>
      <div class="step-content"><p>Envoyez-nous un email avec les informations suivantes :</p></div>
      <div class="info-box"><h3>📋 Informations à fournir</h3>
        <ul class="info-list">
          <li><strong>Nature du problème</strong> (sur-facturation, sous-facturation, produit défectueux, etc.)</li>
          <li><strong>Heure approximative</strong> de votre transaction</li>
          <li><strong>Produits concernés</strong></li>
          <li><strong>Les 4 derniers chiffres</strong> de votre carte bancaire ou titre restaurant</li>
        </ul>
      </div>
    </div>
    <div class="sav-section"><div class="sav-section-title"><span class="number">3</span>Résolution et remboursement</div>
      <div class="step-content"><p>Notre équipe SAV prendra contact avec vous dans les plus brefs délais pour vérifier la transaction, résoudre le problème et procéder au remboursement si nécessaire.</p></div>
    </div>
    <div class="contact-box"><h2>📧 Nous contacter</h2><p style="font-size:18px;font-weight:bold;margin:10px 0">${escapeHtml(email)}</p><p>Notre équipe vous répondra rapidement pour régler votre incident</p></div>
  </div>`;
  document.getElementById('modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

loadMenuData().then(renderMenu).catch((error) => {
  document.getElementById('menu-sections').innerHTML = `<div class="section"><div class="empty-state">${escapeHtml(error.message)}</div></div>`;
});
</script>
</body>
</html>
